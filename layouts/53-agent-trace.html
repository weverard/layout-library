<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>53 · Streaming Agent Trace — Layout scaffold</title>
<!--
  PATTERN    Streaming Agent Trace
  NAV MODEL  A commerce chat where, after the shopper asks, the agent STREAMS
             its work before answering — reasoning lines and TOOL CALLS appear
             one by one, each expandable to show mock arguments/results — then
             a final answer with product results. A toggle shows/hides the
             agent's thinking.
  BEST FOR   Agentic transparency, debugging agents, trust/explainable AI demos.
  REGIONS    .chat · .user-msg · .trace (.trace-step: .reasoning / .tool-call
             expandable) · .answer (product results) · .thinking-toggle
  RE-SKIN    --accent = tool-call accents + run button + answer chrome;
             collapses to single column on screens below 600px.
-->
<style>
  :root {
    --bg: #F5F5F3;
    --surface: #ffffff;
    --ink: #141417;
    --muted: #72737c;
    --line: rgba(20,20,23,.10);
    --accent: #059669;
    --accent-bg: #ecfdf5;
    --accent-muted: #6ee7b7;
    --user-bg: #1a1a1f;
    --user-ink: #f0f0ee;
    --trace-bg: #f8faf9;
    --tool-bg: #f0fdf8;
    --sans: ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono: ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
  }
  a { color: inherit; text-decoration: none; }

  /* layout */
  .shell {
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 20px 80px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .masthead {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 32px;
  }
  .masthead .logo {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 15px; font-weight: 700; flex-shrink: 0;
  }
  .masthead .name { font-weight: 700; font-size: 16px; }
  .masthead .tag { font-size: 12px; color: var(--muted); margin-left: 4px; }

  /* chat area */
  .chat {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  /* user message */
  .user-msg {
    align-self: flex-end;
    max-width: 72%;
    background: var(--user-bg);
    color: var(--user-ink);
    border-radius: 18px 18px 4px 18px;
    padding: 13px 17px;
    font-size: 15px;
    line-height: 1.5;
  }

  /* trace container */
  .trace-wrap {
    align-self: flex-start;
    width: 100%;
  }
  .thinking-toggle {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--accent);
    background: none;
    border: 1px solid var(--accent-muted);
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
    appearance: none;
    font: inherit;
    margin-bottom: 10px;
    transition: background .15s;
  }
  .thinking-toggle:hover { background: var(--accent-bg); }
  .thinking-toggle .arrow { font-size: 10px; transition: transform .2s; }
  .thinking-toggle.collapsed .arrow { transform: rotate(-90deg); }

  .trace {
    background: var(--trace-bg);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow: hidden;
    margin-bottom: 14px;
    transition: all .2s;
  }
  .trace.hidden { display: none; }

  /* trace steps */
  .trace-step {
    display: flex;
    flex-direction: column;
    gap: 0;
    animation: fadeSlide .25s ease;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(4px); }
    to   { opacity: 1; transform: none; }
  }

  .reasoning {
    font-size: 13px;
    color: var(--muted);
    padding: 4px 6px;
    font-family: var(--mono);
    letter-spacing: -.01em;
  }
  .reasoning::before { content: '// '; opacity: .5; }

  /* tool-call row */
  .tool-call {
    border-radius: 8px;
    background: var(--tool-bg);
    border: 1px solid rgba(5,150,105,.16);
    overflow: hidden;
  }
  .tool-call-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 11px;
    cursor: pointer;
    user-select: none;
  }
  .tool-call-header:hover { background: rgba(5,150,105,.06); }
  .tool-name {
    font-size: 13px;
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 600;
  }
  .tool-result-badge {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    background: rgba(5,150,105,.08);
    border-radius: 4px;
    padding: 2px 7px;
  }
  .tool-expand-icon {
    font-size: 10px;
    color: var(--muted);
    margin-left: 8px;
    transition: transform .2s;
    flex-shrink: 0;
  }
  .tool-call.open .tool-expand-icon { transform: rotate(90deg); }
  .tool-body {
    display: none;
    border-top: 1px solid rgba(5,150,105,.12);
    padding: 10px 12px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    line-height: 1.7;
    white-space: pre;
  }
  .tool-call.open .tool-body { display: block; }
  .tool-section-label {
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    opacity: .7;
    margin-bottom: 4px;
  }
  .tool-result-text { color: var(--ink); white-space: pre-wrap; }

  /* answer area */
  .answer {
    align-self: flex-start;
    width: 100%;
    animation: fadeSlide .3s ease;
  }
  .answer-bubble {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 18px 20px;
    font-size: 15px;
    line-height: 1.6;
  }
  .answer-bubble .agent-tag {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--accent);
    font-weight: 600;
    letter-spacing: .04em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .answer-bubble .agent-tag::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .answer-intro { margin-bottom: 14px; color: var(--ink); }
  .products {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 4px;
  }
  .product-card {
    border: 1px solid var(--line);
    border-radius: 11px;
    overflow: hidden;
    background: var(--bg);
  }
  .product-swatch {
    height: 64px;
  }
  .product-info {
    padding: 10px 11px 11px;
  }
  .product-name {
    font-size: 13px;
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 4px;
  }
  .product-price {
    font-size: 14px;
    font-weight: 700;
    color: var(--accent);
  }
  .product-rating {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* run button area */
  .controls {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-top: 24px;
  }
  .btn-run {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--accent);
    color: #fff;
    border: 0;
    border-radius: 10px;
    padding: 11px 22px;
    font-size: 14px;
    font-weight: 600;
    font-family: var(--sans);
    cursor: pointer;
    appearance: none;
    transition: opacity .15s, transform .1s;
  }
  .btn-run:hover { opacity: .9; }
  .btn-run:active { transform: scale(.97); }
  .btn-run:disabled { opacity: .45; cursor: not-allowed; transform: none; }
  .btn-reset {
    display: inline-flex;
    align-items: center;
    background: none;
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 13px;
    font-family: var(--sans);
    color: var(--muted);
    cursor: pointer;
    appearance: none;
    transition: border-color .15s, color .15s;
  }
  .btn-reset:hover { border-color: var(--ink); color: var(--ink); }
  .status-msg {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  /* streaming cursor */
  .cursor {
    display: inline-block;
    width: 2px; height: 13px;
    background: var(--accent);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink .7s infinite;
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  /* responsive */
  @media (max-width: 600px) {
    .products { grid-template-columns: 1fr; }
    .user-msg { max-width: 88%; }
    .masthead .tag { display: none; }
  }

  /* scaffold badge */
  .scaffold {
    position: fixed; right: 16px; bottom: 16px; z-index: 9;
    background: #000; color: #fff;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 12px;
    font-family: var(--mono);
  }
  .scaffold a { color: #fff; opacity: .6; }
  .scaffold a:hover { opacity: 1; }
</style>
</head>
<body>
<div class="shell">
  <div class="masthead">
    <div class="logo">A</div>
    <span class="name">Aria</span>
    <span class="tag">· Meridian Shopping Assistant</span>
  </div>

  <div class="chat" id="chat">
    <!-- user query bubble -->
    <div class="user-msg">Find me waterproof hiking boots under $150, size 10</div>

    <!-- trace + answer injected here by JS -->
    <div id="agent-output"></div>
  </div>

  <div class="controls">
    <button class="btn-run" id="btn-run">▶ Run</button>
    <button class="btn-reset" id="btn-reset" style="display:none">↺ Reset</button>
    <span class="status-msg" id="status-msg"></span>
  </div>
</div>

<div class="scaffold">53 · agent-trace &nbsp;<a href="index.html">↔ gallery</a></div>

<script>
(function () {
  /* ── script data ── */
  var STEPS = [
    { type: 'reasoning', text: 'Parsing constraints: waterproof, <$150, size 10…' },
    { type: 'reasoning', text: 'Identifying relevant catalog filters…' },
    {
      type: 'tool',
      name: 'search_catalog',
      args: '{\n  "q": "waterproof hiking boots",\n  "max_price": 150,\n  "size": "10",\n  "filters": ["waterproof","trail"]\n}',
      result: '→ 8 matches found',
      resultDetail: '8 products returned (price range $79–$148)'
    },
    { type: 'reasoning', text: 'Ranking by relevance score and waterproof rating…' },
    {
      type: 'tool',
      name: 'get_product_details',
      args: '{\n  "ids": ["PRD-4821","PRD-3390","PRD-5017"],\n  "fields": ["name","price","rating","stock"]\n}',
      result: '→ 3 details fetched',
      resultDetail: 'All in stock, ratings 4.2–4.7'
    },
    { type: 'reasoning', text: 'Selecting top 3 by rating within budget…' }
  ];

  var PRODUCTS = [
    { name: 'TrailGuard Pro GTX', price: '$128', rating: '4.7 ★ (312)', swatch: 'linear-gradient(135deg,#4a5568,#2d3748)' },
    { name: 'Summit Dry 2.0', price: '$109', rating: '4.4 ★ (201)', swatch: 'linear-gradient(135deg,#2b6cb0,#1a365d)' },
    { name: 'Ridgeline WP Boot', price: '$143', rating: '4.2 ★ (88)', swatch: 'linear-gradient(135deg,#744210,#92400e)' }
  ];

  var DELAYS = [500, 900, 1100, 1700, 2100, 2800]; /* ms after run to reveal each step */
  var ANSWER_DELAY = 3400;

  /* ── state ── */
  var timers = [];
  var running = false;

  /* ── dom refs ── */
  var btnRun    = document.getElementById('btn-run');
  var btnReset  = document.getElementById('btn-reset');
  var statusMsg = document.getElementById('status-msg');
  var output    = document.getElementById('agent-output');

  /* ── timer helpers ── */
  function clearAllTimers() {
    for (var i = 0; i < timers.length; i++) clearTimeout(timers[i]);
    timers = [];
  }

  function delay(fn, ms) {
    var id = setTimeout(fn, ms);
    timers.push(id);
    return id;
  }

  /* ── reset ── */
  function reset() {
    clearAllTimers();
    running = false;
    output.innerHTML = '';
    btnRun.disabled = false;
    btnRun.textContent = '▶ Run';
    btnReset.style.display = 'none';
    statusMsg.textContent = '';
  }

  /* ── build trace DOM ── */
  function buildTraceWrap() {
    var wrap = document.createElement('div');
    wrap.className = 'trace-wrap';

    var toggle = document.createElement('button');
    toggle.className = 'thinking-toggle';
    toggle.innerHTML = '<span>⬇ Thinking</span><span class="arrow">▼</span>';
    toggle.setAttribute('aria-expanded', 'true');
    toggle.addEventListener('click', function () {
      var hidden = traceEl.classList.toggle('hidden');
      toggle.classList.toggle('collapsed', hidden);
      var arrow = toggle.querySelector('.arrow');
      arrow.textContent = hidden ? '▼' : '▼';
      toggle.setAttribute('aria-expanded', String(!hidden));
      toggle.querySelector('span').textContent = hidden ? '▶ Thinking' : '⬇ Thinking';
    });

    var traceEl = document.createElement('div');
    traceEl.className = 'trace';
    traceEl.id = 'trace-inner';

    wrap.appendChild(toggle);
    wrap.appendChild(traceEl);
    return { wrap: wrap, trace: traceEl };
  }

  /* ── add reasoning line ── */
  function addReasoning(trace, text) {
    var step = document.createElement('div');
    step.className = 'trace-step';
    var line = document.createElement('div');
    line.className = 'reasoning';
    line.textContent = text;
    step.appendChild(line);
    trace.appendChild(step);
    trace.scrollTop = trace.scrollHeight;
  }

  /* ── add tool call row ── */
  function addToolCall(trace, data) {
    var step = document.createElement('div');
    step.className = 'trace-step';

    var toolDiv = document.createElement('div');
    toolDiv.className = 'tool-call';

    var header = document.createElement('div');
    header.className = 'tool-call-header';
    header.innerHTML = '<span class="tool-name">🔍 ' + data.name + '(…)</span>' +
      '<span><span class="tool-result-badge">' + data.result + '</span>' +
      '<span class="tool-expand-icon">▶</span></span>';

    var body = document.createElement('div');
    body.className = 'tool-body';
    body.innerHTML = '<div class="tool-section-label">Args</div>' +
      '<div>' + escHtml(data.args) + '</div>' +
      '<div class="tool-section-label" style="margin-top:10px">Result</div>' +
      '<div class="tool-result-text">' + escHtml(data.resultDetail) + '</div>';

    header.addEventListener('click', function () {
      toolDiv.classList.toggle('open');
    });

    toolDiv.appendChild(header);
    toolDiv.appendChild(body);
    step.appendChild(toolDiv);
    trace.appendChild(step);
    trace.scrollTop = trace.scrollHeight;
  }

  /* ── render final answer ── */
  function renderAnswer(container) {
    var answerDiv = document.createElement('div');
    answerDiv.className = 'answer';

    var bubble = document.createElement('div');
    bubble.className = 'answer-bubble';

    var tag = document.createElement('div');
    tag.className = 'agent-tag';
    tag.textContent = 'ARIA';

    var intro = document.createElement('p');
    intro.className = 'answer-intro';
    intro.textContent = 'Here are 3 waterproof hiking boots in size 10, all under $150 and in stock:';

    var grid = document.createElement('div');
    grid.className = 'products';

    PRODUCTS.forEach(function (p) {
      var card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML =
        '<div class="product-swatch" style="background:' + p.swatch + '"></div>' +
        '<div class="product-info">' +
        '<div class="product-name">' + escHtml(p.name) + '</div>' +
        '<div class="product-price">' + p.price + '</div>' +
        '<div class="product-rating">' + p.rating + '</div>' +
        '</div>';
      grid.appendChild(card);
    });

    bubble.appendChild(tag);
    bubble.appendChild(intro);
    bubble.appendChild(grid);
    answerDiv.appendChild(bubble);
    container.appendChild(answerDiv);
  }

  /* ── run stream ── */
  function run() {
    if (running) return;
    clearAllTimers();
    running = true;
    btnRun.disabled = true;
    btnRun.textContent = 'Streaming…';
    statusMsg.textContent = 'Agent is working…';

    var built = buildTraceWrap();
    output.appendChild(built.wrap);
    var trace = built.trace;

    STEPS.forEach(function (step, i) {
      delay(function () {
        if (step.type === 'reasoning') {
          addReasoning(trace, step.text);
        } else {
          addToolCall(trace, step);
        }
      }, DELAYS[i]);
    });

    delay(function () {
      renderAnswer(output);
      running = false;
      btnRun.textContent = '✓ Done';
      statusMsg.textContent = '';
      btnReset.style.display = '';
    }, ANSWER_DELAY);
  }

  /* ── escape helper ── */
  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── wire up ── */
  btnRun.addEventListener('click', function () {
    if (!running) run();
  });

  btnReset.addEventListener('click', function () {
    reset();
  });
})();
</script>
</body>
</html>
