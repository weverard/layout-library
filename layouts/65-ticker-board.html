<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>65 · Ticker / Stock-Board — Layout scaffold</title>
<!--
  PATTERN    Ticker / Stock-Board
  NAV MODEL  A live board of rows — each an instrument whose value ticks on a
             timer and flashes green/down or red on change. A marquee scrolls
             the same data across the top. Click a row to open its detail pane
             with a sparkline; this pauses the board's ticking so the numbers
             hold still while you read, and resumes it when the pane closes.
  BEST FOR   Markets, live ops metrics, leaderboards.
  REGIONS    .marquee  ·  .board (rows: symbol, value, Δ, trend)  ·
             .detail (sparkline + stats)
  RE-SKIN    --accent = positive Δ (paired with --down for negative). Breakpoint
             ~720px: .detail goes from a docked right-side panel to a full
             overlay.
-->
<style>
  :root{
    --accent:#22C55E; --accent-ink:#fff;
    --bg:#0a0a0d; --surface:#131318; --ink:#f2f3f5; --muted:#84899a; --line:rgba(255,255,255,.10);
    --pos:var(--accent); --neg:#B3261E;
    --serif:Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; --mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,monospace;
    --s1:8px; --s2:14px; --s3:24px; --s4:40px;
    --row:#17171d; --down:#F43F5E;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5}
  a{color:inherit;text-decoration:none}

  .wrap{max-width:960px;margin:0 auto;padding:0 0 80px}
  .masthead{display:flex;align-items:baseline;justify-content:space-between;padding:28px 24px 18px}
  .masthead .brand{font-weight:700;font-size:17px}
  .masthead .sub{font-family:var(--mono);font-size:12px;color:var(--muted)}

  /* ── Marquee ─────────────────────────────────────────────────────────── */
  .marquee{overflow:hidden;white-space:nowrap;border-top:1px solid var(--line);border-bottom:1px solid var(--line);background:var(--surface)}
  .marquee-track{display:inline-flex;padding:10px 0;animation:marquee 22s linear infinite}
  .marquee-track .mi{font-family:var(--mono);font-size:13px;padding:0 22px;color:var(--muted);display:inline-flex;gap:8px;align-items:center}
  .marquee-track .mi b{color:var(--ink);font-weight:600}
  .marquee-track .mi .up{color:var(--accent)}
  .marquee-track .mi .down{color:var(--down)}
  @keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}

  /* ── Board ───────────────────────────────────────────────────────────── */
  .board{margin:20px 24px;border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--surface)}
  .hrow,.row{display:grid;grid-template-columns:70px 1fr 96px 88px 90px;gap:12px;align-items:center;padding:12px 18px}
  .hrow{font-family:var(--mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
  .row{border-bottom:1px solid var(--line);cursor:pointer;background:var(--row);transition:background .15s}
  .row:last-child{border-bottom:0}
  .row:hover{background:#1c1c24}
  .row.selected{background:#1c2430}
  .sym{font-family:var(--mono);font-weight:700;letter-spacing:.03em}
  .nm{color:var(--muted);font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .val{font-family:var(--mono);font-size:14px;font-variant-numeric:tabular-nums;border-radius:5px;padding:3px 6px;transition:background-color .25s,color .25s}
  .val.flash-up{animation:flashUp 1.1s ease-out}
  .val.flash-down{animation:flashDown 1.1s ease-out}
  @keyframes flashUp{0%{background:rgba(34,197,94,.55);color:#fff}100%{background:transparent;color:var(--ink)}}
  @keyframes flashDown{0%{background:rgba(244,63,94,.55);color:#fff}100%{background:transparent;color:var(--ink)}}
  .delta{font-family:var(--mono);font-size:13px;font-variant-numeric:tabular-nums}
  .delta.up{color:var(--accent)}
  .delta.down{color:var(--down)}
  .trend{display:flex;align-items:flex-end;gap:2px;height:22px}
  .trend i{flex:1;border-radius:1.5px;background:var(--muted);opacity:.5;display:block}
  .trend.up i{background:var(--accent);opacity:.85}
  .trend.down i{background:var(--down);opacity:.85}

  .col-optional{display:block}

  /* ── Detail pane ─────────────────────────────────────────────────────── */
  .detail{
    position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;
    background:#0e0e13;border-left:1px solid var(--line);z-index:20;
    transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);
    padding:26px 24px;overflow-y:auto;
  }
  .detail.open{transform:translateX(0)}
  .detail-scrim{position:fixed;inset:0;background:rgba(0,0,0,0);pointer-events:none;transition:background .2s;z-index:19}
  .detail-scrim.open{background:rgba(0,0,0,.4);pointer-events:auto}
  .detail .close{position:absolute;top:20px;right:22px;font-family:var(--mono);font-size:12px;color:var(--muted);cursor:pointer}
  .detail .k{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
  .detail h2{font-size:22px;margin-bottom:2px}
  .detail .price{font-family:var(--mono);font-size:30px;margin:14px 0 4px;font-variant-numeric:tabular-nums}
  .detail .paused-note{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:18px}
  .detail svg{width:100%;height:120px;display:block;margin-bottom:18px}
  .detail .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .detail .stat{border:1px solid var(--line);border-radius:10px;padding:10px 12px}
  .detail .stat .sk{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
  .detail .stat .sv{font-family:var(--mono);font-size:15px}

  @media (max-width:720px){
    .row,.hrow{grid-template-columns:56px 1fr 84px 70px}
    .col-optional{display:none}
    .detail{width:100%;max-width:100%}
  }

  .scaffold{position:fixed;left:16px;bottom:16px;z-index:99;background:#000;color:#fff;border-radius:999px;padding:8px 14px;font-size:12px;font-family:var(--mono)}
  .scaffold a{color:#fff;opacity:.6}.scaffold a:hover{opacity:1}
</style>
</head>
<body>
  <div class="wrap">
    <div class="masthead">
      <span class="brand">◇ Meridian Markets</span>
      <span class="sub" id="tickLabel">live &middot; ticking every 1.4s</span>
    </div>

    <div class="marquee">
      <div class="marquee-track" id="marqueeTrack"></div>
    </div>

    <div class="board" id="board">
      <div class="hrow">
        <span>Symbol</span><span>Name</span><span>Value</span><span>Δ</span><span class="col-optional">Trend</span>
      </div>
      <div id="rows"></div>
    </div>
  </div>

  <div class="detail-scrim" id="scrim"></div>
  <aside class="detail" id="detail">
    <span class="close" id="detailClose">close ✕</span>
    <div id="detailBody"></div>
  </aside>

  <div class="scaffold">65 · ticker-board &nbsp;<a href="../index.html">↔ gallery</a></div>

<script>
(function(){
  // ── Seeded PRNG (mulberry32) — deterministic pseudo-random walk ────────
  function mulberry32(a){
    return function(){
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }
  var rand = mulberry32(918273645);

  // ── Fictional instruments — invented names/symbols, no real tickers ────
  var INSTRUMENTS = [
    { sym:"NWH",  nm:"Northwind Holdings",  value:128.40, vol:0.9 },
    { sym:"CBLT", nm:"Cobalt Dynamics",     value: 64.12, vol:1.6 },
    { sym:"FRNV", nm:"Fern & Vale",         value: 19.85, vol:0.4 },
    { sym:"OBSL", nm:"Obsidian Logistics",  value: 91.03, vol:1.1 },
    { sym:"AMBR", nm:"Amber Tide Energy",   value: 37.66, vol:1.3 },
    { sym:"SALT", nm:"Saltflat Materials",  value: 12.94, vol:0.5 },
    { sym:"HLND", nm:"Highland Robotics",   value:210.77, vol:2.4 },
    { sym:"DLTJ", nm:"Delta Junction Foods",value: 48.21, vol:0.7 },
    { sym:"IVCP", nm:"Ivory Cape Materials",value: 73.55, vol:1.0 },
    { sym:"VRDG", nm:"Verdant Ridge Group", value:156.30, vol:1.8 }
  ];

  var HISTORY_LEN = 36;
  INSTRUMENTS.forEach(function(inst){
    inst.open = inst.value;
    inst.history = [];
    for(var i = 0; i < HISTORY_LEN; i++) inst.history.push(inst.value);
    inst.dir = 0; // -1 down, 0 flat, 1 up (last tick)
  });

  var rowsEl = document.getElementById('rows');
  var marqueeTrack = document.getElementById('marqueeTrack');
  var detailEl = document.getElementById('detail');
  var scrimEl = document.getElementById('scrim');
  var detailBodyEl = document.getElementById('detailBody');
  var tickLabelEl = document.getElementById('tickLabel');

  var selectedSym = null;
  var tickTimer = null;
  var TICK_MS = 1400;

  function fmt(v){ return v.toFixed(2); }
  function pct(from, to){ return ((to - from) / from) * 100; }

  function buildRowHtml(inst){
    var changePct = pct(inst.open, inst.value);
    var dirClass = changePct > 0 ? 'up' : changePct < 0 ? 'down' : '';
    // Trend mirrors the same cumulative-since-open direction as Δ, so the
    // mini sparkline colour always agrees with the delta reading next to it
    // (the per-cell flash below is the one thing that reflects the latest
    // single tick, not the cumulative trend).
    var bars = sparkBars(inst.history, 10);
    return '' +
      '<span class="sym">' + inst.sym + '</span>' +
      '<span class="nm">' + inst.nm + '</span>' +
      '<span class="val" id="val-' + inst.sym + '">' + fmt(inst.value) + '</span>' +
      '<span class="delta ' + dirClass + '">' + (changePct >= 0 ? '▲' : '▼') + ' ' + Math.abs(changePct).toFixed(2) + '%</span>' +
      '<span class="trend col-optional ' + dirClass + '">' + bars + '</span>';
  }

  function sparkBars(history, count){
    var slice = history.slice(-count);
    var min = Math.min.apply(null, slice), max = Math.max.apply(null, slice);
    var range = (max - min) || 1;
    return slice.map(function(v){
      var h = 20 + ((v - min) / range) * 80; // 20%..100%
      return '<i style="height:' + h.toFixed(0) + '%"></i>';
    }).join('');
  }

  function renderRows(){
    rowsEl.innerHTML = INSTRUMENTS.map(function(inst){
      return '<div class="row' + (selectedSym === inst.sym ? ' selected' : '') + '" data-sym="' + inst.sym + '">' + buildRowHtml(inst) + '</div>';
    }).join('');
  }

  function renderMarquee(){
    var items = INSTRUMENTS.map(function(inst){
      var changePct = pct(inst.open, inst.value);
      var dirClass = changePct > 0 ? 'up' : changePct < 0 ? 'down' : '';
      return '<span class="mi"><b>' + inst.sym + '</b> ' + fmt(inst.value) + ' <span class="' + dirClass + '">' + (changePct >= 0 ? '▲' : '▼') + (Math.abs(changePct)).toFixed(2) + '%</span></span>';
    }).join('');
    marqueeTrack.innerHTML = items + items; // duplicated for seamless -50% loop
  }

  function flashCell(sym, dir){
    var cell = document.getElementById('val-' + sym);
    if(!cell) return;
    cell.classList.remove('flash-up', 'flash-down');
    void cell.offsetWidth; // force reflow so the animation restarts
    cell.classList.add(dir > 0 ? 'flash-up' : 'flash-down');
  }

  function tick(){
    INSTRUMENTS.forEach(function(inst){
      var delta = (rand() - 0.5) * inst.vol;
      var next = Math.max(0.5, inst.value + delta);
      inst.dir = next > inst.value ? 1 : next < inst.value ? -1 : 0;
      inst.value = next;
      inst.history.push(next);
      if(inst.history.length > HISTORY_LEN) inst.history.shift();
    });
    renderRows();
    renderMarquee();
    INSTRUMENTS.forEach(function(inst){
      if(inst.dir !== 0) flashCell(inst.sym, inst.dir);
    });
    attachRowHandlers();
  }

  function startTicking(){
    if(tickTimer === null){
      tickTimer = setInterval(tick, TICK_MS);
      tickLabelEl.textContent = 'live · ticking every 1.4s';
    }
  }

  function stopTicking(){
    if(tickTimer !== null){
      clearInterval(tickTimer);
      tickTimer = null;
      tickLabelEl.textContent = 'paused · reading detail';
    }
  }

  function drawSparklineSvg(history){
    var w = 320, h = 110, pad = 6;
    var min = Math.min.apply(null, history), max = Math.max.apply(null, history);
    var range = (max - min) || 1;
    var stepX = (w - pad * 2) / (history.length - 1);
    var pts = history.map(function(v, i){
      var x = pad + i * stepX;
      var y = h - pad - ((v - min) / range) * (h - pad * 2);
      return x.toFixed(1) + ',' + y.toFixed(1);
    });
    var lastUp = history[history.length - 1] >= history[0];
    var stroke = lastUp ? 'var(--accent)' : 'var(--down)';
    return '<svg viewBox="0 0 ' + w + ' ' + h + '" preserveAspectRatio="none">' +
      '<polyline points="' + pts.join(' ') + '" fill="none" stroke="' + stroke + '" stroke-width="2" stroke-linejoin="round" stroke-linecap="round" />' +
      '</svg>';
  }

  function openDetail(sym){
    var inst = INSTRUMENTS.filter(function(i){ return i.sym === sym; })[0];
    if(!inst) return;
    stopTicking(); // hold the numbers still while the detail pane is open
    selectedSym = sym;
    var changePct = pct(inst.open, inst.value);
    var dirClass = changePct >= 0 ? 'up' : 'down';
    var high = Math.max.apply(null, inst.history).toFixed(2);
    var low = Math.min.apply(null, inst.history).toFixed(2);
    detailBodyEl.innerHTML =
      '<p class="k">Instrument detail</p>' +
      '<h2>' + inst.sym + ' &middot; ' + inst.nm + '</h2>' +
      '<div class="price">' + fmt(inst.value) + '</div>' +
      '<p class="delta ' + dirClass + '">' + (changePct >= 0 ? '▲' : '▼') + ' ' + Math.abs(changePct).toFixed(2) + '% since open</p>' +
      '<p class="paused-note">Ticking is paused while this pane is open.</p>' +
      drawSparklineSvg(inst.history) +
      '<div class="stats">' +
        '<div class="stat"><div class="sk">Open</div><div class="sv">' + fmt(inst.open) + '</div></div>' +
        '<div class="stat"><div class="sk">Last</div><div class="sv">' + fmt(inst.value) + '</div></div>' +
        '<div class="stat"><div class="sk">High</div><div class="sv">' + high + '</div></div>' +
        '<div class="stat"><div class="sk">Low</div><div class="sv">' + low + '</div></div>' +
      '</div>';
    detailEl.classList.add('open');
    scrimEl.classList.add('open');
    renderRows();
    attachRowHandlers();
  }

  function closeDetail(){
    selectedSym = null;
    detailEl.classList.remove('open');
    scrimEl.classList.remove('open');
    renderRows();
    attachRowHandlers();
    startTicking(); // resume — guarded by the null check above, so repeated
                     // open/close cycles never stack up extra intervals
  }

  function attachRowHandlers(){
    Array.prototype.forEach.call(rowsEl.querySelectorAll('.row'), function(row){
      row.onclick = function(){ openDetail(row.getAttribute('data-sym')); };
    });
  }

  document.getElementById('detailClose').addEventListener('click', closeDetail);
  scrimEl.addEventListener('click', closeDetail);
  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && selectedSym) closeDetail();
  });

  // ── Init ────────────────────────────────────────────────────────────
  renderRows();
  renderMarquee();
  attachRowHandlers();
  startTicking();
})();
</script>
</body>
</html>
