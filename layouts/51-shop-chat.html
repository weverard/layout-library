<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>51 · Mobile Shopping Chat — Layout scaffold</title>
<!--
  PATTERN    Mobile Shopping Chat
  NAV MODEL  A free-scrolling assistant chat inside a phone; the shopper types or taps
             quick-reply chips, and the assistant replies with inline PRODUCT CARDS you
             can add to a cart; a cart pill tracks the count.
  BEST FOR   conversational commerce, shopping assistants, in-app concierge.
  REGIONS    .phone · .thread (.msg.user / .msg.bot) · .product-card (swatch / name /
             price / Add) · .composer (chips + input) · .cart-pill.
  RE-SKIN    --accent = assistant accents + Add buttons + cart pill; phone centers ≥480px,
             full-bleed below.
-->
<style>
  :root{
    --accent:#0EA5E9; --accent-ink:#fff;
    --bg:#111317; --surface:#fff; --ink:#16161a; --muted:#6b7280; --line:rgba(20,20,26,.1);
    --pos:var(--accent); --neg:#B3261E;
    --serif:Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --s1:8px; --s2:14px; --s3:24px; --s4:40px;
    --accent-lt:#e0f2fe; --bot-bg:#f1f5f9; --user-bg:#0EA5E9;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans);background:var(--bg);color:var(--ink);
    -webkit-font-smoothing:antialiased;min-height:100vh;
    display:grid;place-items:center;
  }

  /* ── phone frame ── */
  .phone{
    position:relative;
    width:390px;max-width:100vw;
    height:92vh;max-height:844px;
    background:#0a0a0a;
    border-radius:50px;
    padding:12px;
    box-shadow:0 40px 100px rgba(0,0,0,.7),inset 0 0 0 1px rgba(255,255,255,.12);
  }
  .screen{
    position:relative;
    width:100%;height:100%;
    border-radius:40px;
    overflow:hidden;
    background:var(--surface);
    display:flex;flex-direction:column;
  }
  .notch{
    position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:126px;height:34px;background:#0a0a0a;
    border-radius:0 0 20px 20px;z-index:20;
  }

  /* ── app header ── */
  .app-header{
    flex-shrink:0;
    padding:40px 18px 12px;
    border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:10px;
    background:var(--surface);
    position:relative;z-index:10;
  }
  .bot-avatar{
    width:32px;height:32px;border-radius:50%;
    background:linear-gradient(135deg,var(--accent),#38bdf8);
    display:flex;align-items:center;justify-content:center;
    font-size:14px;color:#fff;font-weight:700;flex-shrink:0;
  }
  .bot-name{font-size:15px;font-weight:600;letter-spacing:-.01em}
  .bot-status{font-size:11px;color:#22c55e;margin-top:1px}
  .cart-pill{
    margin-left:auto;
    background:var(--accent);color:#fff;
    border-radius:999px;
    padding:5px 10px;
    font-size:12px;font-weight:700;font-family:var(--mono);
    display:flex;align-items:center;gap:4px;
    transition:transform .15s,background .15s;
    min-width:48px;justify-content:center;
  }
  .cart-pill.bump{transform:scale(1.15)}
  .cart-pill .bag-ico{font-size:13px}

  /* ── thread ── */
  .thread{
    flex:1;overflow-y:auto;overflow-x:hidden;
    padding:16px 0 8px;
    scroll-behavior:smooth;
  }
  .thread-inner{padding:0 14px;display:flex;flex-direction:column;gap:10px}

  /* messages */
  .msg{display:flex;gap:8px;animation:rise .25s ease}
  @keyframes rise{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .msg.bot{align-items:flex-end}
  .msg.user{flex-direction:row-reverse}
  .msg-av{
    width:26px;height:26px;border-radius:50%;flex-shrink:0;
    background:linear-gradient(135deg,var(--accent),#38bdf8);
    font-size:10px;color:#fff;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .msg.user .msg-av{background:#d1d5db}
  .bubble{
    max-width:82%;background:var(--bot-bg);
    border-radius:18px;padding:10px 13px;
    font-size:14px;line-height:1.5;color:var(--ink);
  }
  .msg.user .bubble{
    background:var(--user-bg);color:#fff;
    border-bottom-right-radius:5px;
  }
  .msg.bot .bubble{border-bottom-left-radius:5px}

  /* typing indicator */
  .typing{display:inline-flex;gap:4px;padding:4px 2px}
  .typing i{
    display:block;width:6px;height:6px;border-radius:50%;
    background:var(--muted);animation:bln 1s infinite;
  }
  .typing i:nth-child(2){animation-delay:.15s}
  .typing i:nth-child(3){animation-delay:.3s}
  @keyframes bln{0%,60%,100%{opacity:.25}30%{opacity:1}}

  /* product cards row */
  .products-row{
    display:flex;flex-direction:column;gap:8px;margin-top:6px;width:100%;
  }
  /* single wide card (horizontal) */
  .product-card{
    background:#fff;border:1px solid #e2e8f0;border-radius:14px;
    padding:10px 12px;
    display:flex;align-items:center;gap:10px;
    box-shadow:0 1px 4px rgba(0,0,0,.06);
  }
  .product-swatch{
    width:48px;height:48px;border-radius:10px;flex-shrink:0;
  }
  .product-info{flex:1;min-width:0}
  .product-name{font-size:13px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .product-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .product-price{font-size:13px;font-weight:700;color:var(--ink);margin-top:3px}
  .add-btn{
    display:inline-block;
    appearance:none;background:var(--accent);border:0;padding:0;
    font:inherit;cursor:pointer;
    color:#fff;font-size:12px;font-weight:700;
    border-radius:8px;padding:6px 10px;
    flex-shrink:0;white-space:nowrap;
    transition:background .15s,transform .1s;
    -webkit-tap-highlight-color:transparent;
  }
  .add-btn:active{transform:scale(.94)}
  .add-btn.added{background:#22c55e}

  /* bot text with "add" confirmation */
  .confirm-line{color:#22c55e;font-weight:600;font-size:13px;margin-top:2px}

  /* ── composer ── */
  .composer{
    flex-shrink:0;background:var(--surface);
    border-top:1px solid var(--line);padding:10px 12px 12px;
  }
  .chips{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
  .chip{
    display:inline-block;
    appearance:none;background:none;border:0;padding:0;font:inherit;cursor:pointer;
    background:var(--accent-lt);color:var(--accent);
    border:1px solid rgba(14,165,233,.3);
    border-radius:999px;padding:5px 11px;font-size:12px;font-weight:500;
    white-space:nowrap;
    -webkit-tap-highlight-color:transparent;
    transition:background .12s;
  }
  .chip:active{background:rgba(14,165,233,.25)}
  .input-row{display:flex;gap:8px;align-items:center}
  .msg-input{
    flex:1;border:1px solid var(--line);border-radius:22px;
    padding:9px 14px;font:inherit;font-size:14px;color:var(--ink);
    background:#f8fafc;outline:none;
    transition:border-color .15s;
  }
  .msg-input:focus{border-color:var(--accent)}
  .send-btn{
    display:block;
    appearance:none;background:var(--accent);border:0;padding:0;
    font:inherit;cursor:pointer;
    width:36px;height:36px;border-radius:50%;
    color:#fff;font-size:16px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    -webkit-tap-highlight-color:transparent;
    transition:background .15s;
  }
  .send-btn:active{background:#0284c7}

  /* ── responsive: full-bleed below 480px ── */
  @media(max-width:479px){
    body{display:block;background:var(--surface);padding:0}
    .phone{width:100%;height:100vh;max-height:none;border-radius:0;padding:0;background:transparent;box-shadow:none}
    .screen{border-radius:0}
    .notch{display:none}
    .app-header{padding-top:20px}
  }

  /* ── scaffold badge ── */
  .scaffold{
    position:fixed;right:16px;bottom:16px;z-index:99;
    background:#000;color:#fff;border-radius:999px;
    padding:8px 14px;font-size:12px;font-family:var(--mono);
    border:1px solid rgba(255,255,255,.15);
  }
  .scaffold a{color:#fff;opacity:.6}
  .scaffold a:hover{opacity:1}
</style>
</head>
<body>

  <div class="phone">
    <div class="screen">
      <div class="notch"></div>

      <!-- header -->
      <div class="app-header">
        <div class="bot-avatar">A</div>
        <div>
          <div class="bot-name">Aria · Lumen Shop</div>
          <div class="bot-status">● Online</div>
        </div>
        <div class="cart-pill" id="cartPill">
          <span class="bag-ico">🛍</span>
          <span id="cartCount">0</span>
        </div>
      </div>

      <!-- thread -->
      <div class="thread" id="thread">
        <div class="thread-inner" id="threadInner"></div>
      </div>

      <!-- composer -->
      <div class="composer">
        <div class="chips" id="chips"></div>
        <div class="input-row">
          <input class="msg-input" id="msgInput" type="text" placeholder="Message Aria…" autocomplete="off" />
          <button class="send-btn" id="sendBtn" aria-label="Send">↑</button>
        </div>
      </div>

    </div>
  </div>

  <div class="scaffold">51 · shop-chat &nbsp;<a href="../index.html">↔ gallery</a></div>

<script>
(function(){
  var threadInner = document.getElementById('threadInner');
  var threadEl    = document.getElementById('thread');
  var msgInput    = document.getElementById('msgInput');
  var sendBtn     = document.getElementById('sendBtn');
  var chipsEl     = document.getElementById('chips');
  var cartCountEl = document.getElementById('cartCount');
  var cartPillEl  = document.getElementById('cartPill');

  var cartCount = 0;
  var scriptStep = 0; // which step of the scripted flow we are on

  /* ── Products catalogue ── */
  var PRODUCTS = [
    {
      id:'p1',
      name:'Velo Runner Pro',
      sub:'Lightweight mesh · sizes 6–13',
      price:'$89',
      swatch:'linear-gradient(135deg,#0ea5e9,#38bdf8)'
    },
    {
      id:'p2',
      name:'Terra Stride X',
      sub:'Trail outsole · cushioned',
      price:'$112',
      swatch:'linear-gradient(135deg,#f97316,#fb923c)'
    },
    {
      id:'p3',
      name:'Nova Pace Lite',
      sub:'Road + gym dual-use',
      price:'$74',
      swatch:'linear-gradient(135deg,#8b5cf6,#a78bfa)'
    }
  ];

  /* ── Scripted flow ── */
  var SCRIPT = [
    /* step 0 — initial chips lead here, or on load */
    {
      trigger: null, /* shown as greeting */
      chips: ['Show me running shoes','What\'s new?','Help me find a gift'],
      botReply: function(){ return mkText('Hey there! I\'m Aria, your Lumen shopping assistant. What can I help you find today?'); }
    },
    /* step 1 — user asks about running shoes */
    {
      trigger: 'shoes',
      chips: ['Add the blue ones','Tell me more','I need a bag instead'],
      botReply: function(){ return mkCards(); }
    },
    /* step 2 — user adds a card (handled inline, but script can also handle chip) */
    {
      trigger: 'add',
      chips: ['Proceed to checkout','Keep shopping','Show me bags'],
      botReply: function(){ return mkText('Nice choice! I\'ve added it to your cart. Ready to checkout, or want to keep exploring?'); }
    },
    /* step 3 — checkout */
    {
      trigger: 'checkout',
      chips: ['Start over'],
      botReply: function(){
        return mkText('Great — your cart is ready. Tap <strong>Pay now</strong> in the checkout to complete your order with Lumen Pay. Your items will ship within 2 business days. ✓');
      }
    }
  ];

  /* ── DOM helpers ── */

  function scrollToBottom(){
    threadEl.scrollTop = threadEl.scrollHeight;
  }

  function mkMsg(role, contentEl){
    var row = document.createElement('div');
    row.className = 'msg ' + role;
    var av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = role === 'bot' ? 'A' : 'U';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    if(typeof contentEl === 'string'){
      bubble.innerHTML = contentEl;
    } else {
      bubble.appendChild(contentEl);
    }
    row.appendChild(av);
    row.appendChild(bubble);
    threadInner.appendChild(row);
    scrollToBottom();
    return row;
  }

  function mkText(html){
    var span = document.createElement('span');
    span.innerHTML = html;
    return span;
  }

  function mkCards(){
    var wrap = document.createElement('div');
    var intro = document.createElement('div');
    intro.style.cssText = 'font-size:14px;margin-bottom:8px';
    intro.textContent = 'Here are our top picks for running shoes right now:';
    wrap.appendChild(intro);
    var row = document.createElement('div');
    row.className = 'products-row';
    PRODUCTS.forEach(function(p){
      var card = document.createElement('div');
      card.className = 'product-card';
      var swatch = document.createElement('div');
      swatch.className = 'product-swatch';
      swatch.style.background = p.swatch;
      var info = document.createElement('div');
      info.className = 'product-info';
      info.innerHTML = '<div class="product-name">' + p.name + '</div>'
        + '<div class="product-sub">' + p.sub + '</div>'
        + '<div class="product-price">' + p.price + '</div>';
      var addBtn = document.createElement('button');
      addBtn.className = 'add-btn';
      addBtn.textContent = 'Add';
      addBtn.setAttribute('data-pid', p.id);
      addBtn.setAttribute('data-name', p.name);
      card.appendChild(swatch);
      card.appendChild(info);
      card.appendChild(addBtn);
      row.appendChild(card);
    });
    wrap.appendChild(row);
    return wrap;
  }

  function addUserMsg(text){
    mkMsg('user', text);
  }

  function showTyping(cb){
    var row = document.createElement('div');
    row.className = 'msg bot';
    var av = document.createElement('div');
    av.className = 'msg-av';
    av.textContent = 'A';
    var bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="typing"><i></i><i></i><i></i></span>';
    row.appendChild(av);
    row.appendChild(bubble);
    threadInner.appendChild(row);
    scrollToBottom();
    var tid = setTimeout(function(){
      row.remove();
      cb();
      scrollToBottom();
    }, 700);
    return tid;
  }

  function setChips(arr){
    chipsEl.innerHTML = '';
    arr.forEach(function(label){
      var btn = document.createElement('button');
      btn.className = 'chip';
      btn.textContent = label;
      chipsEl.appendChild(btn);
    });
  }

  /* ── Cart ── */
  function bumpCart(){
    cartCount++;
    cartCountEl.textContent = cartCount;
    cartPillEl.classList.add('bump');
    var tid = setTimeout(function(){ cartPillEl.classList.remove('bump'); }, 200);
    void tid;
  }

  /* ── Script advancement ── */
  function detectStep(text){
    var t = text.toLowerCase();
    if(t.indexOf('shoe') !== -1 || t.indexOf('running') !== -1 || t.indexOf('new') !== -1){ return 1; }
    if(t.indexOf('add') !== -1 || t.indexOf('blue') !== -1){ return 2; }
    if(t.indexOf('checkout') !== -1 || t.indexOf('proceed') !== -1){ return 3; }
    return -1; /* no match → generic */
  }

  function respondToInput(userText){
    addUserMsg(userText);
    var stepIdx = detectStep(userText);
    if(stepIdx > 0 && stepIdx >= scriptStep){
      scriptStep = stepIdx;
    } else if(stepIdx < 0 || stepIdx < scriptStep){
      stepIdx = -1;
    }

    showTyping(function(){
      if(stepIdx < 0){
        var row = mkMsg('bot', 'I\'m here to help you find the perfect item. Try asking about running shoes, bags, or gifts!');
        void row;
        setChips(SCRIPT[scriptStep] ? SCRIPT[scriptStep].chips : []);
      } else {
        var step = SCRIPT[stepIdx];
        var contentEl = step.botReply();
        mkMsg('bot', contentEl);
        setChips(step.chips);
      }
    });
  }

  /* ── Add button handler (delegated) ── */
  threadInner.addEventListener('click', function(e){
    var btn = e.target.closest('.add-btn');
    if(!btn) return;
    if(btn.classList.contains('added')) return;
    var pname = btn.getAttribute('data-name');
    btn.classList.add('added');
    btn.textContent = '✓ Added';
    bumpCart();
    scriptStep = 2;
    showTyping(function(){
      mkMsg('bot', '<span>Nice pick! <strong>' + pname + '</strong> is in your cart. Want to keep browsing or head to checkout?</span>');
      setChips(SCRIPT[2].chips);
    });
  });

  /* ── Chip clicks ── */
  chipsEl.addEventListener('click', function(e){
    var btn = e.target.closest('.chip');
    if(!btn) return;
    var txt = btn.textContent;
    respondToInput(txt);
    msgInput.focus();
  });

  /* ── Send button / enter ── */
  function handleSend(){
    var val = msgInput.value.trim();
    if(!val) return;
    msgInput.value = '';
    respondToInput(val);
  }

  sendBtn.addEventListener('click', handleSend);
  msgInput.addEventListener('keydown', function(e){
    if(e.key === 'Enter'){ e.preventDefault(); handleSend(); }
  });

  /* ── Greeting on load ── */
  var greetEl = SCRIPT[0].botReply();
  mkMsg('bot', greetEl);
  setChips(SCRIPT[0].chips);

})();
</script>
</body>
</html>
