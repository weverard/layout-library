<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>10 · Timeline Scrubber — Layout scaffold</title>
<!--
  PATTERN    Timeline Scrubber
  NAV MODEL  A horizontal time axis is the primary control. Drag the handle (or
             click a marker / arrow) to scrub; the nearest event expands.
  BEST FOR   History, roadmaps, changelogs, a career, a product story.
  REGIONS    .stage (current event)  ·  .track (axis + markers + thumb)
  RE-SKIN    --accent; events array drives markers + positions.
-->
<style>
  :root{
    --accent:#FFC34D; --accent-ink:#fff;
    --bg:#0f1117; --surface:#fff; --ink:#EAECF2; --muted:#9498a6; --line:rgba(255,255,255,.13);
    --pos:var(--accent); --neg:#B3261E;
    --serif:Georgia,"Times New Roman",serif;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --s1:8px; --s2:14px; --s3:24px; --s4:40px;
    --panel:#161922;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}

  .stage{flex:1;display:grid;place-items:center;padding:40px;text-align:center}
  .card{max-width:600px;transition:opacity .25s}
  .card .yr{font-family:var(--mono);font-size:64px;font-weight:700;letter-spacing:-.02em;color:var(--accent);line-height:1}
  .card .k{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:14px}
  .card h2{font-size:34px;letter-spacing:-.015em;margin:8px 0 12px}
  .card p{font-size:18px;color:var(--muted);line-height:1.55}

  .dock{padding:30px 6vw 44px;background:linear-gradient(0deg,var(--panel),transparent)}
  .track{position:relative;height:54px;cursor:pointer}
  .track .rail{position:absolute;top:50%;left:0;right:0;height:2px;background:var(--line);transform:translateY(-50%)}
  .track .fill{position:absolute;top:50%;left:0;height:2px;background:var(--accent);transform:translateY(-50%)}
  .marker{position:absolute;top:50%;width:12px;height:12px;border-radius:50%;background:var(--bg);border:2px solid var(--line);transform:translate(-50%,-50%);transition:border-color .2s,transform .2s}
  .marker .ml{position:absolute;left:50%;top:-26px;transform:translateX(-50%);font-family:var(--mono);font-size:11px;color:var(--muted);white-space:nowrap}
  .marker.passed{border-color:var(--accent)}
  .marker.cur{border-color:var(--accent);background:var(--accent);transform:translate(-50%,-50%) scale(1.5)}
  .thumb{position:absolute;top:50%;width:24px;height:24px;border-radius:50%;background:var(--accent);transform:translate(-50%,-50%);box-shadow:0 4px 14px rgba(255,195,77,.5);cursor:grab}
  .thumb:active{cursor:grabbing}
  .nav{display:flex;justify-content:center;gap:10px;margin-top:22px}
  .nav button{font-family:var(--mono);font-size:13px;background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:9px;padding:8px 16px;cursor:pointer}
  .nav button:hover{border-color:var(--accent)}

  .scaffold{position:fixed;right:16px;top:16px;z-index:9;background:#000;color:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:12px;font-family:var(--mono)}
  .scaffold a{color:#fff;opacity:.6}.scaffold a:hover{opacity:1}
</style>
</head>
<body>
  <div class="stage"><div class="card" id="card"></div></div>
  <div class="dock">
    <div class="track" id="track">
      <div class="rail"></div><div class="fill" id="fill"></div>
      <div class="thumb" id="thumb"></div>
    </div>
    <div class="nav"><button id="prev">← Prev</button><button id="next">Next →</button></div>
  </div>
  <div class="scaffold">10 · timeline-scrubber &nbsp;<a href="../index.html">↔ gallery</a></div>

  <script>
    const EVENTS=[
      {y:"2019",k:"Founding",t:"Two people, one idea",d:"Started in a spare room with a prototype and a waitlist of forty."},
      {y:"2020",k:"First release",t:"Shipped v1",d:"Public launch. The waitlist converted faster than the servers could handle."},
      {y:"2021",k:"Scale",t:"Crossed 10k users",d:"Hired the first team and rebuilt the core for an order more load."},
      {y:"2022",k:"Platform",t:"Opened the API",d:"Turned the product into a platform others could build on."},
      {y:"2024",k:"Today",t:"A category, not a tool",d:"What was one feature is now the way a whole workflow gets done."}
    ];
    const track=document.getElementById('track'),thumb=document.getElementById('thumb'),fill=document.getElementById('fill'),card=document.getElementById('card');
    const N=EVENTS.length;let cur=0;
    EVENTS.forEach((e,i)=>{const m=document.createElement('div');m.className='marker';m.style.left=(i/(N-1)*100)+'%';m.dataset.i=i;m.innerHTML=`<span class="ml">${e.y}</span>`;track.appendChild(m);});
    const markers=[...track.querySelectorAll('.marker')];
    function show(i,animate=true){
      cur=i;const pct=i/(N-1)*100;thumb.style.left=pct+'%';fill.style.width=pct+'%';
      markers.forEach((m,j)=>{m.classList.toggle('passed',j<=i);m.classList.toggle('cur',j===i);});
      const e=EVENTS[i];card.style.opacity=0;
      setTimeout(()=>{card.innerHTML=`<div class="yr">${e.y}</div><p class="k">${e.k}</p><h2>${e.t}</h2><p>${e.d}</p>`;card.style.opacity=1;},animate?140:0);
    }
    function nearestFromX(clientX){const r=track.getBoundingClientRect();const p=Math.min(1,Math.max(0,(clientX-r.left)/r.width));return Math.round(p*(N-1));}
    let dragging=false;
    thumb.addEventListener('mousedown',()=>dragging=true);
    addEventListener('mousemove',e=>{if(!dragging)return;const i=nearestFromX(e.clientX);if(i!==cur)show(i);});
    addEventListener('mouseup',()=>dragging=false);
    track.addEventListener('click',e=>{if(e.target===thumb)return;show(nearestFromX(e.clientX));});
    document.getElementById('prev').onclick=()=>show(Math.max(0,cur-1));
    document.getElementById('next').onclick=()=>show(Math.min(N-1,cur+1));
    addEventListener('keydown',e=>{if(e.key==='ArrowLeft')show(Math.max(0,cur-1));if(e.key==='ArrowRight')show(Math.min(N-1,cur+1));});
    show(0,false);
  </script>
</body>
</html>
