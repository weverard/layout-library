<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>29 · Marquee Index — Layout scaffold</title>
<!--
  PATTERN    Marquee Index
  NAV MODEL  Big type scrolls continuously in opposing rows. Hover pauses a row
              and highlights it; click an item to open it. Kinetic, editorial.
  BEST FOR   Bold portfolios, fashion/hype, an index that wants to feel alive.
  REGIONS    .row > .track (duplicated for seamless loop)  ·  .detail
  RE-SKIN    --accent; ROWS array. Speed via animation-duration.
-->
<style>
  :root{
    --accent:#D6FF3F; --accent-ink:#fff;
    --bg:#0c0c0d; --surface:#fff; --ink:#f3f3f1; --muted:#7c7c84; --line:rgba(0,0,0,.12);
    --pos:var(--accent); --neg:#B3261E;
    --serif:Georgia,"Times New Roman",serif;
    --sans:"Helvetica Neue",Inter,ui-sans-serif,system-ui,Arial,sans-serif; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
    --s1:8px; --s2:14px; --s3:24px; --s4:40px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  .top{display:flex;justify-content:space-between;align-items:center;padding:22px 28px;border-bottom:1px solid rgba(255,255,255,.12)}
  .top .brand{font-weight:800;letter-spacing:-.02em;font-size:20px}
  .top .k{font-family:var(--mono);font-size:12px;color:var(--muted)}

  .rows{padding:24px 0}
  .row{overflow:hidden;border-bottom:1px solid rgba(255,255,255,.08);padding:6px 0}
  .track{display:inline-flex;white-space:nowrap;will-change:transform;animation:scroll 26s linear infinite}
  .row:nth-child(even) .track{animation-direction:reverse}
  .row:hover .track{animation-play-state:paused}
  @keyframes scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
  .item{font-size:clamp(40px,8vw,96px);font-weight:800;letter-spacing:-.03em;text-transform:uppercase;padding:0 .35em;cursor:pointer;color:var(--ink);transition:color .15s,-webkit-text-stroke .15s}
  .item:hover{color:var(--accent)}
  .item .yr{font-size:.3em;vertical-align:super;color:var(--muted);font-weight:600}
  .row:nth-child(3n) .item{-webkit-text-stroke:1.5px var(--ink);color:transparent}
  .row:nth-child(3n) .item:hover{color:var(--accent);-webkit-text-stroke:1.5px var(--accent)}

  .detail{position:fixed;left:0;right:0;bottom:0;z-index:20;background:var(--accent);color:#0c0c0d;transform:translateY(100%);transition:transform .3s;padding:24px 28px;display:flex;justify-content:space-between;align-items:center;gap:20px}
  .detail.show{transform:none}
  .detail h2{font-size:28px;letter-spacing:-.02em}
  .detail p{max-width:46ch;font-size:15px}
  .detail .x{font-family:var(--mono);font-size:13px;cursor:pointer;border:1px solid #0c0c0d;border-radius:999px;padding:7px 13px}

  .scaffold{position:fixed;right:16px;top:14px;z-index:30;background:#000;color:#fff;border:1px solid rgba(255,255,255,.2);border-radius:999px;padding:8px 14px;font-size:12px;font-family:var(--mono)}
  .scaffold a{color:#fff;opacity:.6}.scaffold a:hover{opacity:1}
</style>
</head>
<body>
  <div class="top"><span class="brand">RUNNER◆</span><span class="k">hover to pause · click to open</span></div>
  <div class="rows" id="rows"></div>

  <div class="detail" id="detail">
    <div><h2 id="dT">—</h2><p id="dD"></p></div>
    <span class="x" id="x">close ✕</span>
  </div>
  <div class="scaffold">29 · marquee &nbsp;<a href="../index.html">↔ gallery</a></div>

  <script>
    const ROWS=[
      [["Atlas","24","A pannable map of everything we make."],["Beacon","24","Command-first documentation."],["Ledger","23","The centered reader."]],
      [["Vantage","24","A scroll-driven product story."],["Pinboard","23","Things worth keeping."],["Cobalt","22","Deep-blue identity work."]],
      [["Ember","24","Warmth and motion study."],["Lagoon","23","Coastal systems."],["Iris","22","Soft-violet brand."]]
    ];
    const rows=document.getElementById('rows'),detail=document.getElementById('detail');
    ROWS.forEach(items=>{
      const row=document.createElement('div');row.className='row';
      const track=document.createElement('div');track.className='track';
      const make=()=>items.map(([t,y,d])=>`<span class="item" data-t="${t}" data-d="${d}">${t}<span class="yr">${y}</span> &nbsp;·&nbsp; </span>`).join('');
      track.innerHTML=make()+make();           // duplicate for seamless -50% loop
      row.appendChild(track);rows.appendChild(row);
    });
    rows.addEventListener('click',e=>{const it=e.target.closest('.item');if(!it)return;
      document.getElementById('dT').textContent=it.dataset.t;document.getElementById('dD').textContent=it.dataset.d;detail.classList.add('show');});
    document.getElementById('x').onclick=()=>detail.classList.remove('show');
  </script>
</body>
</html>
