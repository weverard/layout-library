<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>40 · Carousel / Slideshow — Layout scaffold</title>
<!--
  PATTERN    Carousel / Slideshow
  NAV MODEL  Paged hero slides; prev/next arrows, dot indicators, autoplay
             (pauses on hover), and keyboard ArrowLeft/Right.
  BEST FOR   Hero banners, featured galleries, testimonials.
  REGIONS    .carousel (track) · .slide · .dots · .arrows.
  RE-SKIN    --accent = active dot + arrows; full-width responsive.
             Under ~480px arrows shrink but dots stay tappable.
-->
<style>
  :root{
    --bg:#F4F4F2; --surface:#fff; --ink:#16161a; --muted:#6b6f76;
    --line:rgba(20,20,26,.12); --accent:#7C3AED;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);
       -webkit-font-smoothing:antialiased;line-height:1.5}

  /* ── Outer layout ── */
  .page-wrap{
    display:flex;flex-direction:column;align-items:center;
    padding:48px 24px 64px;gap:0;
  }
  .page-title{font-size:13px;font-family:var(--mono);letter-spacing:.08em;
               text-transform:uppercase;color:var(--muted);margin-bottom:24px}

  /* ── Carousel shell ── */
  .carousel-wrap{
    position:relative;width:100%;max-width:820px;
    border-radius:20px;overflow:hidden;
    box-shadow:0 8px 48px rgba(0,0,0,.12);
  }

  /* ── Track ── */
  .carousel{
    display:flex;
    /* translateX driven by JS */
    transition:transform .45s cubic-bezier(.4,0,.2,1);
    will-change:transform;
  }

  /* ── Slides ── */
  .slide{
    min-width:100%;height:420px;
    display:flex;flex-direction:column;
    align-items:flex-start;justify-content:flex-end;
    padding:40px 48px;
    position:relative;overflow:hidden;
    flex-shrink:0;
  }
  .slide::after{
    content:'';position:absolute;inset:0;
    background:linear-gradient(to top,rgba(0,0,0,.6) 0%,rgba(0,0,0,.05) 60%,transparent 100%);
    z-index:0;pointer-events:none;
  }
  .slide-content{position:relative;z-index:1;display:flex;flex-direction:column;gap:10px}
  .slide-kicker{
    font-family:var(--mono);font-size:11px;letter-spacing:.1em;
    text-transform:uppercase;color:rgba(255,255,255,.6);
  }
  .slide-title{font-size:30px;font-weight:800;letter-spacing:-.03em;line-height:1.15;color:#fff}
  .slide-caption{font-size:14px;color:rgba(255,255,255,.75);max-width:42ch;line-height:1.55}

  /* ── Arrows ── */
  .arrows{
    position:absolute;top:50%;transform:translateY(-50%);
    width:100%;display:flex;justify-content:space-between;
    padding:0 14px;pointer-events:none;z-index:10;
  }
  .arrow{
    appearance:none;background:rgba(0,0,0,.4);border:0;padding:0;font:inherit;
    display:block;
    width:44px;height:44px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;color:#fff;cursor:pointer;
    pointer-events:auto;
    backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
    transition:background .15s,transform .1s;
  }
  .arrow:hover{background:var(--accent);transform:scale(1.08)}
  .arrow:active{transform:scale(.95)}

  /* ── Dots ── */
  .dots{
    display:flex;gap:8px;justify-content:center;margin-top:20px;padding:4px 0;
  }
  .dot{
    appearance:none;background:none;border:0;padding:0;font:inherit;cursor:pointer;
    display:block;
    width:8px;height:8px;border-radius:50%;
    background:var(--line);border:1.5px solid rgba(20,20,26,.2);
    transition:background .2s,transform .2s,width .25s;
    flex-shrink:0;
  }
  .dot.active{
    background:var(--accent);border-color:transparent;
    width:24px;border-radius:99px;
  }
  /* Bigger tap target on mobile */
  @media(max-width:480px){
    .dot{width:10px;height:10px}
    .dot.active{width:28px}
    .arrow{width:34px;height:34px;font-size:15px}
    .slide{height:300px;padding:24px 20px}
    .slide-title{font-size:22px}
  }

  .scaffold{position:fixed;right:16px;bottom:16px;z-index:9;background:#000;color:#fff;
             border-radius:999px;padding:8px 14px;font-size:12px;font-family:var(--mono)}
  .scaffold a{color:#fff;opacity:.6}.scaffold a:hover{opacity:1}
</style>
</head>
<body>
  <div class="page-wrap">
    <div class="page-title">Featured — Carousel</div>

    <div class="carousel-wrap" id="carouselWrap">
      <div class="carousel" id="carousel">
        <!-- slides injected by JS -->
      </div>
      <div class="arrows">
        <button class="arrow" id="btnPrev" aria-label="Previous slide">←</button>
        <button class="arrow" id="btnNext" aria-label="Next slide">→</button>
      </div>
    </div>

    <div class="dots" id="dots" role="tablist" aria-label="Slides"></div>
  </div>

  <div class="scaffold">40 · carousel &nbsp;<a href="../index.html">↔ gallery</a></div>

<script>
(function(){
  var SLIDES = [
    {
      kicker:'Featured Project',
      title:'Aurora Interface',
      caption:'A reimagining of what it means to navigate through dense information — calmly, beautifully.',
      bg:'linear-gradient(135deg,#1a1040 0%,#3b1f6a 50%,#6d28d9 100%)'
    },
    {
      kicker:'Case Study',
      title:'Maps Without Friction',
      caption:'When cartography meets product design, the map becomes the experience itself.',
      bg:'linear-gradient(135deg,#0f2a1a 0%,#145a32 50%,#166534 100%)'
    },
    {
      kicker:'Product Launch',
      title:'Clarity in Complexity',
      caption:'Fifteen months of research distilled into an interface that vanishes into the task.',
      bg:'linear-gradient(135deg,#1a0f0a 0%,#7c2d12 50%,#c2410c 100%)'
    },
    {
      kicker:'Workshop',
      title:'The Shape of Type',
      caption:'Typography isn\'t just letters — it\'s the rhythm, the pace, the trust between reader and writer.',
      bg:'linear-gradient(135deg,#0a0f1a 0%,#1e3a5f 50%,#1d4ed8 100%)'
    },
    {
      kicker:'Retrospective',
      title:'Year in Review',
      caption:'Four seasons, twelve projects, one consistent thread: make it quieter and more intentional.',
      bg:'linear-gradient(135deg,#111214 0%,#1f2937 50%,#374151 100%)'
    }
  ];

  var NUM = SLIDES.length;
  var currentIdx = 0;
  var intervalId = null;
  var AUTOPLAY_MS = 4000;

  var carouselEl = document.getElementById('carousel');
  var wrapEl = document.getElementById('carouselWrap');
  var dotsEl = document.getElementById('dots');
  var btnPrev = document.getElementById('btnPrev');
  var btnNext = document.getElementById('btnNext');

  /* Build slides */
  SLIDES.forEach(function(data, i){
    var s = document.createElement('div');
    s.className = 'slide';
    s.setAttribute('role','tabpanel');
    s.setAttribute('aria-label', data.title);
    s.style.background = data.bg;
    s.innerHTML =
      '<div class="slide-content">' +
        '<div class="slide-kicker">' + data.kicker + '</div>' +
        '<div class="slide-title">' + data.title + '</div>' +
        '<div class="slide-caption">' + data.caption + '</div>' +
      '</div>';
    carouselEl.appendChild(s);
  });

  /* Build dots */
  var dotEls = [];
  SLIDES.forEach(function(data, i){
    var d = document.createElement('button');
    d.className = 'dot';
    d.setAttribute('role','tab');
    d.setAttribute('aria-label','Go to slide ' + (i + 1) + ': ' + data.title);
    d.setAttribute('aria-selected', i === 0 ? 'true' : 'false');
    dotsEl.appendChild(d);
    dotEls.push(d);
    (function(idx){ d.addEventListener('click', function(){ manualGo(idx); }); })(i);
  });

  /* ── Autoplay — single interval, always cleared before (re)starting ── */
  function stopAutoplay(){
    if(intervalId !== null){
      clearInterval(intervalId);
      intervalId = null;
    }
  }

  function startAutoplay(){
    /* Always stop first to prevent stacked intervals */
    stopAutoplay();
    intervalId = setInterval(function(){
      goTo((currentIdx + 1) % NUM);
    }, AUTOPLAY_MS);
  }

  /* A manual nav action resets the autoplay timer */
  function manualGo(idx){
    goTo(idx);
    /* Reset: stop and restart so timer is fresh from this moment */
    startAutoplay();
  }

  function goTo(idx){
    /* Wrap */
    idx = ((idx % NUM) + NUM) % NUM;
    currentIdx = idx;

    /* Move track */
    carouselEl.style.transform = 'translateX(-' + (idx * 100) + '%)';

    /* Update dots */
    dotEls.forEach(function(d, i){
      d.classList.toggle('active', i === idx);
      d.setAttribute('aria-selected', i === idx ? 'true' : 'false');
    });
  }

  btnPrev.addEventListener('click', function(){ manualGo((currentIdx - 1 + NUM) % NUM); });
  btnNext.addEventListener('click', function(){ manualGo((currentIdx + 1) % NUM); });

  /* Keyboard */
  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowLeft'){
      e.preventDefault();
      manualGo((currentIdx - 1 + NUM) % NUM);
    } else if(e.key === 'ArrowRight'){
      e.preventDefault();
      manualGo((currentIdx + 1) % NUM);
    }
  });

  /* Pause on hover */
  wrapEl.addEventListener('mouseenter', function(){ stopAutoplay(); });
  wrapEl.addEventListener('mouseleave', function(){ startAutoplay(); });

  /* Init */
  goTo(0);
  startAutoplay();
})();
</script>
</body>
</html>
