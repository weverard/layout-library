<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>31 · Tabbed Workspace — Layout scaffold</title>
<!--
  PATTERN    Tabbed Workspace
  NAV MODEL  A browser-in-browser tab strip. Click a tab to switch its pane, × closes a
             tab, + opens a new one, drag a tab to reorder.
  BEST FOR   multi-document tools, dashboards with contexts, editors.
  REGIONS    .tabbar (tabs + new-tab) · .panes (one active .pane).
  RE-SKIN    --accent = active-tab marker; under ~560px tab labels collapse to icons.
-->
<style>
  :root{
    --bg:#F0F0EE; --surface:#fff; --ink:#16161a; --muted:#6b6f76; --line:rgba(20,20,26,.12); --accent:#4338CA;
    --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;height:100vh;display:flex;flex-direction:column;overflow:hidden}

  /* ── chrome shell ── */
  .chrome{background:#e2e2e0;border-bottom:1px solid var(--line);display:flex;align-items:stretch;min-height:42px;overflow:hidden}

  /* ── tab bar ── */
  .tabbar{display:flex;align-items:stretch;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;gap:0}
  .tabbar::-webkit-scrollbar{display:none}

  .tab{display:flex;align-items:center;gap:7px;padding:0 14px 0 16px;font-size:13px;font-weight:500;color:var(--muted);cursor:pointer;border-right:1px solid var(--line);
    background:transparent;white-space:nowrap;min-width:0;flex-shrink:0;
    position:relative;user-select:none;transition:background .1s,color .1s}
  .tab:hover{background:rgba(0,0,0,.06);color:var(--ink)}
  .tab.active{background:var(--surface);color:var(--ink)}
  .tab.active::after{content:"";position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--accent)}
  .tab.drag-over{background:rgba(67,56,202,.12)}

  .tab-label{overflow:hidden;text-overflow:ellipsis;max-width:140px}
  .tab-icon{font-size:15px;flex-shrink:0}
  .tab-close{display:flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:4px;flex-shrink:0;
    appearance:none;background:none;border:0;padding:0;font:inherit;cursor:pointer;
    color:var(--muted);font-size:14px;line-height:1;margin-left:2px}
  .tab-close:hover{background:rgba(0,0,0,.12);color:var(--ink)}

  .btn-new{display:flex;align-items:center;justify-content:center;width:38px;height:100%;flex-shrink:0;
    appearance:none;background:none;border:0;border-left:1px solid var(--line);padding:0;font:inherit;cursor:pointer;
    color:var(--muted);font-size:20px;line-height:1}
  .btn-new:hover{background:rgba(0,0,0,.06);color:var(--ink)}

  /* ── pane area ── */
  .panes{flex:1;overflow:auto;background:var(--surface)}
  .pane{display:none;padding:40px 48px;max-width:820px}
  .pane.active{display:block}

  .pane h1{font-size:28px;letter-spacing:-.02em;margin-bottom:8px}
  .pane .meta{font-size:13px;color:var(--muted);margin-bottom:28px;font-family:var(--mono)}
  .pane p{font-size:15px;line-height:1.65;color:#3a3a42;margin-bottom:16px}
  .pane h2{font-size:17px;letter-spacing:-.01em;margin:28px 0 10px}
  .pane ul{padding-left:20px;font-size:15px;line-height:1.8;color:#3a3a42}
  .pane .callout{background:#f5f4ff;border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:14px 18px;font-size:14px;color:#2d2880;margin:20px 0}

  /* ── responsive: narrow tabs ── */
  @media(max-width:560px){
    .tab-label{display:none}
    .tab{padding:0 10px;min-width:36px;justify-content:center}
    .tab-icon{font-size:16px}
  }

  /* ── scaffold badge ── */
  .scaffold{position:fixed;right:16px;bottom:16px;z-index:9;background:#000;color:#fff;border-radius:999px;padding:8px 14px;font-size:12px;font-family:var(--mono)}
  .scaffold a{color:#fff;opacity:.6}.scaffold a:hover{opacity:1}
</style>
</head>
<body>

  <div class="chrome">
    <div class="tabbar" id="tabbar"></div>
    <button class="btn-new" id="btn-new" title="New tab">+</button>
  </div>
  <div class="panes" id="panes"></div>

  <div class="scaffold">31 · tabbed-workspace &nbsp;<a href="../index.html">↔ gallery</a></div>

<script>
(function(){

  /* ── state ── */
  var nextId = 5;
  var activeId = 1;
  var tabs = [
    { id:1, icon:'📄', title:'Project Overview', body:paneHTML(1) },
    { id:2, icon:'📊', title:'Q2 Metrics',       body:paneHTML(2) },
    { id:3, icon:'📝', title:'Meeting Notes',    body:paneHTML(3) },
    { id:4, icon:'⚙️', title:'Settings',          body:paneHTML(4) },
  ];

  function paneHTML(n){
    switch(n){
      case 1: return '<h1>Project Overview</h1><p class="meta">Last edited · today at 09:14</p><p>This is the main reference document for the current sprint. It covers goals, stakeholders, and the delivery timeline. Use the tabs above to jump between related documents.</p><h2>Goals</h2><ul><li>Ship the new dashboard by end of quarter</li><li>Migrate legacy data pipeline</li><li>Reduce p95 latency below 120 ms</li></ul><div class="callout">Open the <strong>Q2 Metrics</strong> tab to see progress against these goals.</div>';
      case 2: return '<h1>Q2 Metrics</h1><p class="meta">Live data · refreshed 3 min ago</p><p>A summary of the key performance indicators tracked this quarter. All figures are week-over-week unless noted.</p><h2>Headline numbers</h2><ul><li>Active users: <strong>4,812</strong> (+18%)</li><li>P95 latency: <strong>134 ms</strong> (↓ from 189 ms)</li><li>Error rate: <strong>0.4%</strong></li><li>Feature adoption: <strong>61%</strong></li></ul><p>The latency improvement came from the CDN prefetch work completed in week 4.</p>';
      case 3: return '<h1>Meeting Notes</h1><p class="meta">Thursday standup · 08:30</p><p>Quick notes from the team sync. Items marked with ✓ are resolved; open items carry into tomorrow.</p><h2>Discussed</h2><ul><li>✓ Deployment window confirmed for Friday 22:00 UTC</li><li>✓ Design review for onboarding flow — approved with minor tweaks</li><li>Open: data retention policy needs legal sign-off</li><li>Open: API rate-limit documentation still outstanding</li></ul><p>Next standup is tomorrow at 08:30. Async update in the shared channel if you can\'t attend.</p>';
      case 4: return '<h1>Settings</h1><p class="meta">Workspace configuration</p><p>Adjust display, notification, and integration preferences for this workspace. Changes are saved automatically.</p><h2>Display</h2><ul><li>Theme: System default</li><li>Density: Comfortable</li><li>Font size: 14 px</li></ul><h2>Notifications</h2><ul><li>Desktop alerts: On</li><li>Email digest: Daily at 08:00</li></ul><div class="callout">Integrations are managed by your admin. Contact your workspace owner to add new connections.</div>';
      default: return '<h1>New Document</h1><p class="meta">Untitled · just created</p><p>Start typing, or paste content here. This tab was just opened — give it a name by editing the tab title above.</p>';
    }
  }

  /* ── render ── */
  var tabbar = document.getElementById('tabbar');
  var panesEl = document.getElementById('panes');
  var dragSrcId = null;

  function render(){
    /* tabs */
    tabbar.innerHTML = '';
    tabs.forEach(function(t){
      var div = document.createElement('div');
      div.className = 'tab' + (t.id === activeId ? ' active' : '');
      div.dataset.id = t.id;
      div.draggable = true;
      div.innerHTML =
        '<span class="tab-icon">' + t.icon + '</span>' +
        '<span class="tab-label">' + esc(t.title) + '</span>' +
        '<button class="tab-close" data-id="' + t.id + '" title="Close tab">×</button>';
      tabbar.appendChild(div);
    });

    /* panes */
    panesEl.innerHTML = '';
    tabs.forEach(function(t){
      var div = document.createElement('div');
      div.className = 'pane' + (t.id === activeId ? ' active' : '');
      div.dataset.id = t.id;
      div.innerHTML = t.body;
      panesEl.appendChild(div);
    });
  }

  /* ── interactions ── */
  tabbar.addEventListener('click', function(e){
    /* close button */
    var closeBtn = e.target.closest('.tab-close');
    if(closeBtn){
      var cid = Number(closeBtn.dataset.id);
      if(tabs.length === 1) return; /* keep at least 1 */
      var idx = tabs.findIndex(function(t){ return t.id === cid; });
      if(cid === activeId){
        /* activate neighbour */
        var neighbour = tabs[idx + 1] || tabs[idx - 1];
        activeId = neighbour.id;
      }
      tabs.splice(idx, 1);
      render();
      return;
    }
    /* tab click */
    var tabEl = e.target.closest('.tab');
    if(tabEl){
      activeId = Number(tabEl.dataset.id);
      render();
    }
  });

  document.getElementById('btn-new').addEventListener('click', function(){
    var id = nextId++;
    tabs.push({ id:id, icon:'📄', title:'New Document', body:paneHTML(id) });
    activeId = id;
    render();
  });

  /* ── drag-to-reorder ── */
  tabbar.addEventListener('dragstart', function(e){
    var tabEl = e.target.closest('.tab');
    if(!tabEl) return;
    dragSrcId = Number(tabEl.dataset.id);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', dragSrcId);
  });

  tabbar.addEventListener('dragover', function(e){
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    /* highlight target */
    var tabEl = e.target.closest('.tab');
    tabbar.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('drag-over'); });
    if(tabEl && Number(tabEl.dataset.id) !== dragSrcId) tabEl.classList.add('drag-over');
  });

  tabbar.addEventListener('dragleave', function(){
    tabbar.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('drag-over'); });
  });

  tabbar.addEventListener('drop', function(e){
    e.preventDefault();
    tabbar.querySelectorAll('.tab').forEach(function(el){ el.classList.remove('drag-over'); });
    var tabEl = e.target.closest('.tab');
    if(!tabEl) return;
    var dropId = Number(tabEl.dataset.id);
    if(dropId === dragSrcId) return;
    var fromIdx = tabs.findIndex(function(t){ return t.id === dragSrcId; });
    var toIdx   = tabs.findIndex(function(t){ return t.id === dropId; });
    var spliced = tabs.splice(fromIdx, 1)[0];
    tabs.splice(toIdx, 0, spliced);
    render();
    dragSrcId = null;
  });

  function esc(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  render();

})();
</script>
</body>
</html>
